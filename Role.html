<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | Choose Your Role</title>
    <style>
        :root {
            --primary: #205075;
            --light-blue: #6cacca;
            --dark-blue: #154861;
            --white: #ffffff;
            --gray-bg: #f8fafc;
            --transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            display: flex;
            width: 100%;
            max-width: 1000px;
            height: 600px;
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        /* Branding Section (Left) */
        .branding {
            flex: 1;
            background-color: var(--primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center; /* Keeps the whole group centered in the blue panel */
            color: white;
            padding: 40px;
            text-align: center;
        }

        /* Wrapper to lock spacing between logo, line, and text */
        .brand-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }

        .logo-img {
            width: 280px; 
            height: auto;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,0.3));
            display: block;
        }

        /* The Divider Line */
        .divider {
            width: 80px;
            height: 2px;
            background-color: rgba(255, 255, 255, 0.4);
            margin: 15px 0; /* Adjust these 15px to change space above/below line */
            border-radius: 2px;
        }

        .tagline {
            font-size: 0.95rem;
            line-height: 1.4;
            max-width: 220px;
            opacity: 0.9;
            margin: 0; /* Ensures tagline stays tight to the divider */
        }

        /* Selection Section (Right) */
        .selection-panel {
            flex: 1.2;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: var(--white);
        }

        h1 {
            color: var(--dark-blue);
            font-size: 2.2rem;
            margin-bottom: 8px;
        }

        .welcome-text {
            color: #64748b;
            font-size: 1.1rem;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .section-label {
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        /* Role Cards */
        .options-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .role-card {
            display: flex;
            align-items: center;
            padding: 20px;
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            cursor: pointer;
            transition: var(--transition);
        }

        .role-card:hover {
            border-color: var(--light-blue);
            background-color: #f0f9ff;
            transform: translateY(-2px);
        }

        .role-card.selected {
            border-color: var(--primary);
            background-color: #f1f5f9;
            box-shadow: 0 4px 12px rgba(32, 80, 117, 0.1);
        }

        .custom-checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            margin-right: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .role-card.selected .custom-checkbox {
            background-color: var(--primary);
            border-color: var(--primary);
        }

        .role-card.selected .custom-checkbox::after {
            content: '✓';
            color: white;
            font-size: 14px;
            font-weight: bold;
        }

        .role-info h3 {
            color: var(--dark-blue);
            font-size: 1.1rem;
            margin-bottom: 2px;
        }

        .role-info p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        /* Action Button */
        .action-btn {
            margin-top: 40px;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background-color: #cbd5e1;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: not-allowed;
            transition: var(--transition);
        }

        .action-btn.ready {
            background-color: var(--primary);
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(32, 80, 117, 0.2);
        }

        @media (max-width: 768px) {
            .container { flex-direction: column; height: auto; }
            .branding { padding: 60px 20px; }
            .selection-panel { padding: 40px 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="branding">
            <div class="brand-content">
                <img src="Safent-logo.png" alt="Safent Logo" class="logo-img">
                <div class="divider"></div>
                <p class="tagline">Mastering Crowd Safety - Securing Every Event</p>
            </div>
        </div>

        <div class="selection-panel">
            <h1>Welcome !</h1>
            <p class="welcome-text">You're registered successfully.<br>Choose how you'd like to continue this event.</p>

            <p class="section-label">Continue as :</p>

            <div class="options-group">
                <div class="role-card" onclick="selectRole(this, 'User')">
                    <div class="custom-checkbox"></div>
                    <div class="role-info">
                        <h3>User</h3>
                        <p>Browse and participate in events</p>
                    </div>
                </div>

                <div class="role-card" onclick="selectRole(this, 'Event Manager')">
                    <div class="custom-checkbox"></div>
                    <div class="role-info">
                        <h3>Event Manager</h3>
                        <p>Create and manage events</p>
                    </div>
                </div>
            </div>

            <button id="submitBtn" class="action-btn" disabled>Continue to Dashboard</button>
        </div>
    </div>

    <script>
        function selectRole(element, roleName) {
            // Remove selection from all cards
            document.querySelectorAll('.role-card').forEach(card => card.classList.remove('selected'));
            
            // Add selection to clicked card
            element.classList.add('selected');

            // Update button state
            const btn = document.getElementById('submitBtn');
            btn.disabled = false;
            btn.classList.add('ready');
            btn.innerText = `Continue as ${roleName}`;
        }
    </script>
</body>
</html>
