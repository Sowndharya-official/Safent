<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Account</title>

<!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background-color: #f4f8fb;
  font-family: "Segoe UI", sans-serif;
}

.container-box {
  max-width: 900px;
  margin: 50px auto;
  background: #fff;
  padding: 40px;
  border-radius: 12px;
}

h2 {
  color: #154861;
  margin-bottom: 30px;
}

/* Inputs */
.form-control {
  border-radius: 20px;
  border: 1px solid #6cacca;
}

.form-control:focus {
  box-shadow: none;
  border-color: #205075;
}

/* Button */
.btn-create {
  background-color: #205075;
  color: white;
  border-radius: 30px;
  padding: 10px;
}

.btn-create:hover {
  background-color: #154861;
}

/* Link */
.link {
  color: #205075;
  text-decoration: none;
}

.link:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<div class="container container-box">
  <h2>Create Account</h2>

  <form id="createAccountForm">

    <div class="row mb-3">
      <div class="col">
        <label>First Name</label>
        <input type="text" class="form-control" id="fname" placeholder="Enter first name" required>
      </div>
      <div class="col">
        <label>Last Name</label>
        <input type="text" class="form-control" id="lname" placeholder="Enter last name" required>
      </div>
    </div>

    <div class="mb-3">
      <label>Username</label>
      <input type="text" class="form-control" id="username" placeholder="Enter username" required>
    </div>

    <div class="mb-3">
      <label>Password</label>
      <input type="password" class="form-control" id="password" placeholder="Enter password" required>
    </div>

    <div class="mb-4">
      <label>Email</label>
      <input type="email" class="form-control" id="email" placeholder="Enter email" required>
    </div>

    <button type="submit" class="btn btn-create w-100 mb-3">
      Create Account
    </button>

    <p class="text-center">
      Already have an account?
      <a href="Singin_Dash.html" class="link">Login</a>
    </p>

  </form>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<!-- Firebase -->
<script type="module">
/* 🔥 Firebase CDN */
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

/* 🔥 Firebase Config */
const firebaseConfig = {
  apiKey: "AIzaSyAaObKAGlnS_CYpZLjkpaE-VitOtJ4HBus",
  authDomain: "safent-9e0bb.firebaseapp.com",
  projectId: "safent-9e0bb",
  appId: "1:799950088915:web:2cfeaf3ba40a639c680226"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

/* 📧 EmailJS Init */
emailjs.init("lMADoZKYf6YHD73Tr");

/* 📌 Form Submit */
document.getElementById("createAccountForm")
.addEventListener("submit", async (e) => {
  e.preventDefault();

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  try {

    // 1️⃣ Create Firebase User
    await createUserWithEmailAndPassword(auth, email, password);

    // 2️⃣ Send Email using EmailJS
   await emailjs.send(
  "service_yr2klo8",
  "template_ozkwe2e",
  {
    email: email,
    name: document.getElementById("fname").value,
    message: "Your account was created successfully 🎉"
  }
);

    alert("Account created & Email sent successfully!");
    window.location.href = "Dashboard_verification.html";
  } catch (error) {

    console.log(error);

    if (error.code === "auth/email-already-in-use") {
      alert("This email is already registered.");
    } 
    else if (error.code === "auth/weak-password") {
      alert("Password must be at least 6 characters.");
    }
    else {
      alert(error.message);
    }
  }
});
</script>
</body>
</html>
